name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (schema + grammar + typecheck + bundle)
        run: npm run build

      - name: Test
        run: npm test

  package:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Package VSIX (smoke)
        run: npm run package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: keepalived-tools-vsix
          path: "*.vsix"
          if-no-files-found: error
