! keepalived 기본 설정 (정상)
# global section
global_defs {
    router_id LVS_DEVEL
    enable_script_security
}

vrrp_script chk_nginx {
    script "/usr/bin/killall -0 nginx"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass 1111
    }
    track_script {
        chk_nginx
    }
}

virtual_server 10.0.0.1 80 {
    delay_loop 6
    lb_algo wrr
    lb_kind NAT
    protocol tcp
    real_server 192.168.0.10 80 {
        weight 1
        HTTP_GET {
            url {
                path /health
                status_code 200
            }
            connect_timeout 3
        }
    }
}
